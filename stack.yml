services:
  redis:
    image: redis:7-alpine
    container_name: autoclip-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - autoclip_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoclip-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:///./data/autoclip.db
      REDIS_URL: redis://redis:6379/0
      API_MODEL_NAME: gpt-5.4
      API_MAX_TOKENS: 4096
      API_TIMEOUT: 30
      API_DASHSCOPE_API_KEY: ""
      OPENAI_API_KEY: proxypal-local
      OPENAI_BASE_URL: http://host.docker.internal:8317/v1
      PROXYPAL_BASE_URL: http://host.docker.internal:8317/v1
      PROCESSING_CHUNK_SIZE: 5000
      PROCESSING_MIN_SCORE_THRESHOLD: 0.7
      PROCESSING_MAX_CLIPS_PER_COLLECTION: 5
      PROCESSING_MAX_RETRIES: 3
      LOG_LEVEL: INFO
      LOG_FORMAT: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
      LOG_FILE: backend.log
      ENVIRONMENT: production
      DEBUG: "false"
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - autoclip_data:/app/data
      - autoclip_logs:/app/logs
      - autoclip_uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: node:18-slim
    container_name: autoclip-frontend
    restart: unless-stopped
    working_dir: /app/frontend
    command: >
      sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    depends_on:
      backend:
        condition: service_started

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoclip-celery-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:///./data/autoclip.db
      REDIS_URL: redis://redis:6379/0
      API_MODEL_NAME: gpt-5.4
      API_MAX_TOKENS: 4096
      API_TIMEOUT: 30
      API_DASHSCOPE_API_KEY: ""
      OPENAI_API_KEY: proxypal-local
      OPENAI_BASE_URL: http://host.docker.internal:8317/v1
      PROXYPAL_BASE_URL: http://host.docker.internal:8317/v1
      PROCESSING_CHUNK_SIZE: 5000
      PROCESSING_MIN_SCORE_THRESHOLD: 0.7
      PROCESSING_MAX_CLIPS_PER_COLLECTION: 5
      PROCESSING_MAX_RETRIES: 3
      LOG_LEVEL: INFO
      LOG_FORMAT: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
      LOG_FILE: backend.log
      ENVIRONMENT: production
      DEBUG: "false"
      PYTHONPATH: /app
    command: celery -A backend.core.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - autoclip_data:/app/data
      - autoclip_logs:/app/logs
      - autoclip_uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoclip-celery-beat
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:///./data/autoclip.db
      REDIS_URL: redis://redis:6379/0
      API_MODEL_NAME: gpt-5.4
      API_MAX_TOKENS: 4096
      API_TIMEOUT: 30
      API_DASHSCOPE_API_KEY: ""
      OPENAI_API_KEY: proxypal-local
      OPENAI_BASE_URL: http://host.docker.internal:8317/v1
      PROXYPAL_BASE_URL: http://host.docker.internal:8317/v1
      PROCESSING_CHUNK_SIZE: 5000
      PROCESSING_MIN_SCORE_THRESHOLD: 0.7
      PROCESSING_MAX_CLIPS_PER_COLLECTION: 5
      PROCESSING_MAX_RETRIES: 3
      LOG_LEVEL: INFO
      LOG_FORMAT: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
      LOG_FILE: backend.log
      ENVIRONMENT: production
      DEBUG: "false"
      PYTHONPATH: /app
    command: celery -A backend.core.celery_app beat --loglevel=info
    volumes:
      - autoclip_data:/app/data
      - autoclip_logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoclip-flower
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:///./data/autoclip.db
      REDIS_URL: redis://redis:6379/0
      API_MODEL_NAME: gpt-5.4
      API_MAX_TOKENS: 4096
      API_TIMEOUT: 30
      API_DASHSCOPE_API_KEY: ""
      OPENAI_API_KEY: proxypal-local
      OPENAI_BASE_URL: http://host.docker.internal:8317/v1
      PROXYPAL_BASE_URL: http://host.docker.internal:8317/v1
      PROCESSING_CHUNK_SIZE: 5000
      PROCESSING_MIN_SCORE_THRESHOLD: 0.7
      PROCESSING_MAX_CLIPS_PER_COLLECTION: 5
      PROCESSING_MAX_RETRIES: 3
      LOG_LEVEL: INFO
      LOG_FORMAT: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
      LOG_FILE: backend.log
      ENVIRONMENT: production
      DEBUG: "false"
      PYTHONPATH: /app
    command: celery -A backend.core.celery_app flower --port=5555
    ports:
      - "5555:5555"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started

volumes:
  autoclip_redis_data:
    driver: local
  autoclip_data:
    driver: local
  autoclip_logs:
    driver: local
  autoclip_uploads:
    driver: local

networks:
  default:
    name: autoclip-proxpal-network
